name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Lint
        run: swift format lint --recursive --strict Sources Tests Package.swift
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Build documentation
        # Build the docs on every commit so a doc-comment break can't merge and
        # only surface later at release time. This compiles them; it doesn't deploy.
        env:
          MIDEAKIT_DOCS: "1"
        run: |
          swift package --allow-writing-to-directory "$RUNNER_TEMP/docs" \
            generate-documentation --target MideaKit \
            --transform-for-static-hosting --hosting-base-path MideaKit \
            --output-path "$RUNNER_TEMP/docs"
