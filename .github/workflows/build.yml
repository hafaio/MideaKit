name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: swift format lint --recursive --strict Sources Tests Package.swift
      - name: Build
        run: swift build -Xswiftc -strict-concurrency=complete
      - name: Test
        run: swift test
